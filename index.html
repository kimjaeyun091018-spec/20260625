<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>3D 방탈출: 천장 · 다중 방 · 계단</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        html, body { overflow: hidden; width: 100%; height: 100%; margin: 0; padding: 0; }
        #renderCanvas { width: 100%; height: 100%; touch-action: none; }
        #game-ui {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            background-color: rgba(0,0,0,0.85); color: #fff; padding: 15px 30px;
            border: 3px solid #fff; border-radius: 8px; font-size: 18px; z-index: 1000;
            pointer-events: none; display: none; text-align: center; font-family: sans-serif;
        }
        #controls-hint {
            position: absolute; top: 12px; left: 12px; color: #fff;
            background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 6px;
            font-size: 13px; font-family: sans-serif; z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="controls-hint">드래그(터치)로 둘러보기 · WASD 이동 · Space 점프 · 계단으로 2층 다락의 열쇠를 찾아 바깥문으로 탈출</div>
    <div id="game-ui"></div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let hasKey = false, doorOpen = false, won = false;

        const uiBox = document.getElementById('game-ui');
        function showMessage(text) {
            uiBox.innerText = text;
            uiBox.style.display = 'block';
            setTimeout(() => { uiBox.style.display = 'none'; }, 3000);
        }

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.1, 0.1, 0.13); // 어두운 배경 (공포 분위기)

            const camera = new BABYLON.UniversalCamera("cam", new BABYLON.Vector3(0, 1.6, 2.5), scene);
            camera.setTarget(new BABYLON.Vector3(0, 1.6, -4));
            camera.attachControl(canvas, true);
            camera.inertia = 0;
            camera.inputs.removeByType("FreeCameraMouseInput");
            camera.inputs.removeByType("FreeCameraTouchInput");
            camera.inputs.removeByType("FreeCameraKeyboardMoveInput");

            scene.collisionsEnabled = true;
            camera.checkCollisions = true;
            camera.applyGravity = false; // 세로 이동은 아래의 ground-follow 가 직접 처리
            camera.ellipsoid = new BABYLON.Vector3(0.5, 0.8, 0.5);

            // ───────── 재질 ─────────
            const matWall = new BABYLON.StandardMaterial("matWall", scene);
            matWall.diffuseColor = new BABYLON.Color3(0.78, 0.76, 0.72);
            const matFloor = new BABYLON.StandardMaterial("matFloor", scene);
            matFloor.diffuseColor = new BABYLON.Color3(0.32, 0.30, 0.28);
            const matCeil = new BABYLON.StandardMaterial("matCeil", scene);
            matCeil.diffuseColor = new BABYLON.Color3(0.5, 0.48, 0.46);
            const matStair = new BABYLON.StandardMaterial("matStair", scene);
            matStair.diffuseColor = new BABYLON.Color3(0.45, 0.38, 0.32);

            // ───────── 헬퍼 함수 (이걸로 방을 마음대로 늘리세요) ─────────
            // 벽: 충돌 O, 걸어서 통과 불가. (x,y,z = 중심 좌표)
            function makeWall(x, y, z, w, h, d, mat) {
                const b = BABYLON.MeshBuilder.CreateBox("wall", {width:w, height:h, depth:d}, scene);
                b.position.set(x, y, z);
                b.material = mat || matWall;
                b.checkCollisions = true;
                return b;
            }
            // 바닥/발판: isWalkable O(머리 위에서 쏜 광선이 감지), 충돌 X(옆면에 안 막힘). y = 윗면 높이.
            function makeFloor(x, y, z, w, d, mat) {
                const f = BABYLON.MeshBuilder.CreateBox("floor", {width:w, height:0.2, depth:d}, scene);
                f.position.set(x, y - 0.1, z);
                f.material = mat || matFloor;
                f.isWalkable = true;
                f.checkCollisions = false;
                return f;
            }
            // 천장: 윗 공간을 막는 판. y = 아랫면 높이쯤.
            function makeCeiling(x, y, z, w, d, mat) {
                const c = BABYLON.MeshBuilder.CreateBox("ceiling", {width:w, height:0.2, depth:d}, scene);
                c.position.set(x, y, z);
                c.material = mat || matCeil;
                return c;
            }
            // 가운데 문 구멍이 뚫린 벽 (방과 방을 잇는 출입구). 구멍은 x=0 중심.
            function makeDoorwayWall(z, totalW, height, gapW, gapH, mat) {
                const side = (totalW - gapW) / 2;
                makeWall(-(gapW/2 + side/2), height/2, z, side, height, 0.2, mat);   // 왼쪽
                makeWall( (gapW/2 + side/2), height/2, z, side, height, 0.2, mat);   // 오른쪽
                makeWall(0, (gapH + height)/2, z, gapW, height - gapH, 0.2, mat);    // 위 인방
            }
            // 계단: baseY에서 시작해 -z 방향(dir=-1)으로 steps칸 올라간다. 반환값 = 꼭대기 높이.
            function makeStairs(x, baseY, startZ, steps, stepW, stepH, stepD, dir, mat) {
                for (let i = 0; i < steps; i++) {
                    const top = baseY + (i + 1) * stepH;
                    const s = BABYLON.MeshBuilder.CreateBox("step", {width:stepW, height:(top - baseY), depth:stepD}, scene);
                    s.position.set(x, baseY + (top - baseY) / 2, startZ + dir * (i * stepD));
                    s.material = mat || matStair;
                    s.isWalkable = true;       // 광선이 밟을 면 인식
                    s.checkCollisions = false; // 옆면에 막히지 않게
                }
                return baseY + steps * stepH;
            }

            // ───────── 바닥 (방·복도·바깥을 모두 덮는 큰 판) ─────────
            makeFloor(0, 0, -8, 26, 40, matFloor);

            // ───────── 시작 방 A (x[-4,4], z[-4,4], 천장 높이 3) ─────────
            makeWall(0, 1.5, 4, 8, 3, 0.2);     // 뒤 벽
            makeWall(-4, 1.5, 0, 0.2, 3, 8);    // 왼 벽
            makeWall(4, 1.5, 0, 0.2, 3, 8);     // 오른 벽
            makeCeiling(0, 3, 0, 8, 8);         // 천장 A

            // A ↔ B 출입구 (z=-4 벽, 가운데 구멍). 벽 높이는 큰 방 B에 맞춰 6.
            makeDoorwayWall(-4, 8, 6, 2, 2.6);

            // ───────── 큰 방 B (x[-4,4], z[-12,-4], 천장 높이 6 : 2층 다락이 있는 공간) ─────────
            makeWall(-4, 3, -8, 0.2, 6, 8);     // 왼 벽
            makeWall(4, 3, -8, 0.2, 6, 8);      // 오른 벽
            makeCeiling(0, 6, -8, 8, 8);        // 천장 B (높음)
            makeDoorwayWall(-12, 8, 6, 2, 2.6); // 바깥으로 나가는 출구 벽(구멍)

            // ───────── 계단 (방 B 안, 오른쪽 +x 쪽에서 -z 방향으로 2층까지) ─────────
            // 10칸 × 0.3높이 = 3.0 상승, 10칸 × 0.4깊이 = 4.0 전진 (z=-5 → z=-9)
            const loftY = makeStairs(2.75, 0, -5, 10, 1.5, 0.3, 0.4, -1);

            // ───────── 2층 다락 (방 B의 안쪽 위, 높이 loftY=3) ─────────
            makeFloor(0, loftY, -10.25, 8, 3.5, matStair); // 다락 바닥
            makeWall(-1.5, loftY + 0.5, -9, 5, 1, 0.2);    // 떨어짐 방지 난간(낮음). 오른쪽(x[1,4])은 계단 도착부라 비움.

            // ───────── 문 / 열쇠 / 바깥 도착 지점 ─────────
            const door = BABYLON.MeshBuilder.CreateBox("door", {width:1.8, height:2.6, depth:0.15}, scene);
            door.position.set(0, 1.3, -11.9);
            const doorMat = new BABYLON.StandardMaterial("doorMat", scene);
            doorMat.diffuseColor = new BABYLON.Color3(0.35, 0.18, 0.09);
            door.material = doorMat; door.checkCollisions = true;

            const key = BABYLON.MeshBuilder.CreateBox("key", {width:0.3, height:0.3, depth:0.3}, scene);
            key.position.set(0, loftY + 0.4, -10.5); // 다락 위
            const keyMat = new BABYLON.StandardMaterial("keyMat", scene);
            keyMat.diffuseColor = new BABYLON.Color3(1, 0.78, 0);
            keyMat.emissiveColor = new BABYLON.Color3(0.6, 0.45, 0);
            key.material = keyMat;

            const exitPad = BABYLON.MeshBuilder.CreateGround("exitPad", {width:3, height:3}, scene);
            exitPad.position.set(0, 0.03, -14.5);
            const exitMat = new BABYLON.StandardMaterial("exitMat", scene);
            exitMat.diffuseColor = new BABYLON.Color3(0.2, 0.8, 0.3);
            exitMat.emissiveColor = new BABYLON.Color3(0.08, 0.35, 0.13);
            exitPad.material = exitMat;
            exitPad.isWalkable = true; exitPad.checkCollisions = false;

            // ───────── 조명 (어둑한 분위기 + 포인트 라이트) ─────────
            const amb = new BABYLON.HemisphericLight("amb", new BABYLON.Vector3(0, 1, 0), scene);
            amb.intensity = 0.55;
            const lampA = new BABYLON.PointLight("lampA", new BABYLON.Vector3(0, 2.6, 0), scene);
            lampA.intensity = 0.6;
            const lampB = new BABYLON.PointLight("lampB", new BABYLON.Vector3(0, 4.5, -9), scene);
            lampB.intensity = 0.7;

            // ───────── 시선 조작 (드래그 / 터치) ─────────
            const LOOK_SENS = 0.004;
            let dragging = false, lastX = 0, lastY = 0;
            canvas.addEventListener("pointerdown", e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
            const stopDrag = () => dragging = false;
            canvas.addEventListener("pointerup", stopDrag);
            canvas.addEventListener("pointerleave", stopDrag);
            canvas.addEventListener("pointercancel", stopDrag);
            canvas.addEventListener("pointermove", e => {
                if (!dragging) return;
                camera.rotation.y += (e.clientX - lastX) * LOOK_SENS;
                camera.rotation.x += (e.clientY - lastY) * LOOK_SENS;
                lastX = e.clientX; lastY = e.clientY;
            });
            scene.onBeforeRenderObservable.add(() => {
                if (camera.rotation.x > 1.2) camera.rotation.x = 1.2;
                if (camera.rotation.x < -1.2) camera.rotation.x = -1.2;
            });

            // ───────── 수평 이동 (WASD, y=0 → 시선 상하와 무관하게 바닥과 평행) ─────────
            const MOVE_SPEED = 3.2;
            const keys = {};
            window.addEventListener("keydown", e => { keys[e.code] = true; });
            window.addEventListener("keyup",   e => { keys[e.code] = false; });
            scene.onBeforeRenderObservable.add(() => {
                const yaw = camera.rotation.y;
                const forward = new BABYLON.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
                const right   = new BABYLON.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
                const move = BABYLON.Vector3.Zero();
                if (keys["KeyW"]) move.addInPlace(forward);
                if (keys["KeyS"]) move.subtractInPlace(forward);
                if (keys["KeyD"]) move.addInPlace(right);
                if (keys["KeyA"]) move.subtractInPlace(right);
                if (move.lengthSquared() > 0) {
                    const dt = engine.getDeltaTime() / 1000;
                    move.normalize().scaleInPlace(MOVE_SPEED * dt);
                }
                camera.cameraDirection.copyFrom(move); // 벽 충돌은 카메라 내부 처리
            });

            // ───────── ✅ 세로 이동 = ground-follow (계단/여러 층 핵심) ─────────
            // 머리 위에서 아래로 광선을 쏴 '밟고 있는 바닥' 높이를 찾고, 눈높이를 거기에 맞춘다.
            const EYE = 1.6, GRAV = -0.02, JUMP_V = 0.2;
            let velY = 0, grounded = true;
            window.addEventListener("keydown", e => {
                if (e.code === "Space" && grounded) { velY = JUMP_V; grounded = false; }
            });
            const DOWN = new BABYLON.Vector3(0, -1, 0);
            scene.onBeforeRenderObservable.add(() => {
                const origin = camera.position.add(new BABYLON.Vector3(0, 0.1, 0));
                const ray = new BABYLON.Ray(origin, DOWN, 12);
                const hit = scene.pickWithRay(ray, m => m.isWalkable === true);
                const floorY = (hit && hit.hit) ? hit.pickedPoint.y : -Infinity;
                const targetY = floorY + EYE;

                if (grounded) {
                    const diff = targetY - camera.position.y;
                    if (diff > 0.01) {
                        camera.position.y += Math.min(diff, 0.18);       // 계단 오르기 (부드럽게 상승)
                    } else if (diff < -0.6) {
                        grounded = false; velY = 0;                       // 큰 낭떠러지 → 낙하 시작
                    } else if (diff < -0.01) {
                        camera.position.y += Math.max(diff, -0.18);       // 계단 내려가기
                    } else {
                        camera.position.y = targetY;
                    }
                } else {
                    velY += GRAV;
                    camera.position.y += velY;
                    if (camera.position.y <= targetY) {
                        camera.position.y = targetY; velY = 0; grounded = true; // 착지
                    }
                }
            });

            // 열쇠 회전 연출
            scene.onBeforeRenderObservable.add(() => { if (key.visibility > 0) key.rotation.y += 0.03; });

            // ───────── 상호작용 ─────────
            scene.onPointerDown = function (evt, pickResult) {
                if (!pickResult.hit) return;
                const mesh = pickResult.pickedMesh;
                if (mesh === key && !hasKey) {
                    hasKey = true; key.visibility = 0; showMessage('황금 열쇠를 주웠다!');
                } else if (mesh === door) {
                    if (hasKey && !doorOpen) {
                        doorOpen = true; door.position.y += 3; door.checkCollisions = false;
                        showMessage('문이 열렸다! 밖으로 나가자.');
                    } else if (!hasKey) {
                        showMessage('문이 잠겨 있다. 다락의 열쇠를 찾아보자.');
                    }
                }
            };

            // 탈출 판정
            scene.onBeforeRenderObservable.add(() => {
                if (doorOpen && !won && camera.position.z < -12.6) { won = true; showMessage('🎉 탈출 성공!'); }
            });

            return scene;
        };

        const scene = createScene();
        engine.runRenderLoop(() => scene.render());
        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
