<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 방탈출: 인게임 UI 적용</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        /* 고전 게임 대화창 스타일의 UI */
        #game-ui {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85); /* 반투명한 검은색 배경 */
            color: #fff;
            padding: 15px 30px;
            border: 3px solid #fff; /* 하얀색 테두리 */
            border-radius: 8px;
            font-family: 'Malgun Gothic', sans-serif;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 4px 4px 0px #222; /* 픽셀 느낌의 그림자 */
            z-index: 1000; /* 3D 화면보다 무조건 앞에 오도록 설정 */
            pointer-events: none; /* 마우스 클릭을 방해하지 않음 */
            display: none; /* 평소에는 숨겨둠 */
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-ui"></div>

    <a-scene fog="type: exponential; color: #000; density: 0.15" vr-mode-ui="enabled: false">
        
        <a-entity position="0 1.6 0">
            <a-camera look-controls="pointerLockEnabled: true" wasd-controls>
                <a-cursor color="#ff0000" scale="0.8 0.8 0.8"></a-cursor>
                <a-light type="spot" color="#ffffff" intensity="1.5" distance="15" angle="35" position="0 0 0"></a-light>
            </a-camera>
        </a-entity>

        <a-light type="ambient" color="#050505"></a-light>

        <a-plane position="0 0 0" rotation="-90 0 0" width="15" height="15" color="#111"></a-plane>
        <a-box position="0 2 -7.5" width="15" height="4" depth="0.5" color="#222"></a-box>
        <a-box position="0 2 7.5" width="15" height="4" depth="0.5" color="#222"></a-box> 
        <a-box position="-7.5 2 0" rotation="0 90 0" width="15" height="4" depth="0.5" color="#222"></a-box>
        <a-box position="7.5 2 0" rotation="0 90 0" width="15" height="4" depth="0.5" color="#222"></a-box> 

        <a-box id="escape-door" position="0 1.5 -7.2" width="2" height="3" depth="0.2" color="#4a2711"></a-box>
        <a-box id="key" position="-6 0.2 -6" width="0.4" height="0.4" depth="0.4" color="#ffd700"></a-box>

    </a-scene>

    <script>
        let hasKey = false;
        const keyObj = document.querySelector('#key');
        const doorObj = document.querySelector('#escape-door');
        const uiBox = document.querySelector('#game-ui');
        let uiTimeout; // 타이머를 관리할 변수

        // 화면 하단에 메시지를 3초간 띄우는 함수
        function showMessage(text) {
            uiBox.innerText = text;
            uiBox.style.display = 'block'; // 텍스트 상자를 화면에 표시
            
            // 기존에 작동 중인 타이머가 있다면 취소 (메시지가 겹치지 않게)
            clearTimeout(uiTimeout);
            
            // 3초(3000ms) 뒤에 텍스트 상자를 다시 숨김
            uiTimeout = setTimeout(() => {
                uiBox.style.display = 'none';
            }, 3000);
        }

        // 초기 시작 가이드 메시지 띄우기
        setTimeout(() => {
            showMessage('화면을 클릭하면 마우스가 고정됩니다. (취소: ESC)');
        }, 1000);

        // 열쇠 클릭 이벤트
        keyObj.addEventListener('click', () => {
            if (!hasKey) {
                hasKey = true;
                keyObj.setAttribute('visible', 'false');
                keyObj.removeAttribute('class');
                // alert() 대신 우리가 만든 함수 사용
                showMessage('반짝이는 황금 열쇠를 주웠다!'); 
            }
        });

        // 문 클릭 이벤트
        doorObj.addEventListener('click', () => {
            if (hasKey) {
                showMessage('철컥! 열쇠가 맞아 문이 열렸다. 탈출 성공!');
                doorObj.setAttribute('position', '0 4.5 -7.2'); 
            } else {
                // alert() 대신 우리가 만든 함수 사용
                showMessage('문이 굳게 잠겨 있다. 방 안에서 열쇠를 찾아보자.');
            }
        });
    </script>
</body>
</html>
