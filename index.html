<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Babylon.js 1인칭 데모</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
    #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; }
    #hint {
      position: absolute; top: 12px; left: 12px;
      color: #fff; font-family: system-ui, sans-serif; font-size: 14px;
      background: rgba(0,0,0,.55); padding: 8px 12px; border-radius: 6px;
      pointer-events: none;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
</head>
<body>
  <div id="hint">화면을 클릭해 마우스를 잠그고 · WASD 이동 · 마우스로 상하/좌우 시야 회전</div>
  <canvas id="renderCanvas"></canvas>

  <script>
    const canvas = document.getElementById("renderCanvas");
    const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });

    const createScene = () => {
      const scene = new BABYLON.Scene(scene => scene, engine) instanceof BABYLON.Scene
        ? new BABYLON.Scene(engine) : new BABYLON.Scene(engine);

      scene.clearColor = new BABYLON.Color3(0.5, 0.7, 0.9);
      scene.gravity = new BABYLON.Vector3(0, -0.9, 0);
      scene.collisionsEnabled = true;

      // 1인칭 카메라: UniversalCamera 를 사용해야 위/아래 시야가 자연스럽게 동작
      const camera = new BABYLON.UniversalCamera("fpsCam", new BABYLON.Vector3(0, 1.7, -8), scene);
      camera.setTarget(new BABYLON.Vector3(0, 1.7, 0));

      // 핵심: attachControl 이 좌우(yaw)와 상하(pitch)를 모두 자동 처리한다.
      // 직접 pointermove 를 다루지 않으므로 "위아래가 안 움직이는" 문제가 생기지 않는다.
      camera.attachControl(canvas, true);

      // WASD 이동 (기본은 화살표 키만 동작하므로 추가)
      camera.keysUp.push(87);    // W
      camera.keysDown.push(83);  // S
      camera.keysLeft.push(65);  // A
      camera.keysRight.push(68); // D
      camera.speed = 0.35;
      camera.angularSensibility = 800; // 값이 작을수록 마우스 회전이 빨라짐

      // 충돌 + 중력 (사람 크기 캡슐)
      camera.checkCollisions = true;
      camera.applyGravity = true;
      camera.ellipsoid = new BABYLON.Vector3(0.5, 0.85, 0.5);

      const light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);
      light.intensity = 0.95;

      // 바닥
      const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 60, height: 60 }, scene);
      const groundMat = new BABYLON.StandardMaterial("gmat", scene);
      groundMat.diffuseColor = new BABYLON.Color3(0.35, 0.55, 0.35);
      ground.material = groundMat;
      ground.checkCollisions = true;

      // 둘러볼 박스들
      for (let i = 0; i < 7; i++) {
        const box = BABYLON.MeshBuilder.CreateBox("box" + i, { size: 2 }, scene);
        box.position = new BABYLON.Vector3((i - 3) * 4, 1, 10);
        const m = new BABYLON.StandardMaterial("bmat" + i, scene);
        m.diffuseColor = new BABYLON.Color3(0.3 + i * 0.1, 0.4, 0.8 - i * 0.08);
        box.material = m;
        box.checkCollisions = true;
      }

      // 클릭하면 포인터 락(FPS 느낌). 락 상태에서도 attachControl 이 상하/좌우를 처리한다.
      scene.onPointerDown = () => {
        if (!engine.isPointerLock) engine.enterPointerlock();
      };

      return scene;
    };

    const scene = createScene();
    engine.runRenderLoop(() => scene.render());
    window.addEventListener("resize", () => engine.resize());
  </script>
</body>
</html>
