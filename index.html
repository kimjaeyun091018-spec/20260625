<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 방탈출: 화이트 룸 버전</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #game-ui {
            position: absolute;
            bottom: 10%; left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 15px 30px;
            border: 3px solid #fff;
            border-radius: 8px;
            font-size: 18px;
            z-index: 1000;
            pointer-events: none;
            display: none;
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="game-ui"></div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let hasKey = false;

        const uiBox = document.getElementById('game-ui');
        function showMessage(text) {
            uiBox.innerText = text;
            uiBox.style.display = 'block';
            setTimeout(() => { uiBox.style.display = 'none'; }, 3000);
        }

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            
            // 💡 1. 화이트 룸 분위기를 위해 배경색을 밝게 설정하고 안개 제거
            scene.clearColor = new BABYLON.Color3(0.9, 0.9, 0.9);

            // 💡 카메라 배치 및 초기 시선 설정 (방 내부 중앙 뒤쪽에서 문을 바라보게 설정)
            const camera = new BABYLON.UniversalCamera("UniversalCamera", new BABYLON.Vector3(0, 1.6, 2.5), scene);
            camera.setTarget(new BABYLON.Vector3(0, 1.6, -4)); // 정면(문이 있는 곳)을 바라봄
            camera.attachControl(canvas, true);

            // 터치 드래그로 이동하는 기본 기능 차단 (시야 회전만 남김)
            if (camera.inputs.attached.touch) {
                camera.inputs.attached.touch.touchMoveSensibility = 0;
            }

            // 오직 WASD 키로만 이동하도록 키 매핑
            camera.keysUp = [87];    // W
            camera.keysDown = [83];  // S
            camera.keysLeft = [65];  // A
            camera.keysRight = [68]; // D
            
            camera.speed = 0.2;        // 이동 속도 적정치 조절
            camera.angularSensibility = 1500; // 시야 회전 민감도

            // 💡 2. 물리 및 중력/충돌 시스템 전면 활성화
            scene.collisionsEnabled = true;
            camera.checkCollisions = true;
            camera.applyGravity = true;
            // 플레이어 몸체 크기 지정 (반지름 0.4, 높이 0.8의 타원체로 벽에 부딪힘)
            camera.ellipsoid = new BABYLON.Vector3(0.4, 0.8, 0.4);

            // Space바 점프 구현
            let isJumping = false;
            let jumpVelocity = 0;

            window.addEventListener("keydown", function (evt) {
                if (evt.keyCode === 32 && !isJumping && camera.position.y <= 1.7) {
                    isJumping = true;
                    jumpVelocity = 0.12;
                }
            });

            scene.onBeforeRenderObservable.add(() => {
                if (isJumping) {
                    camera.position.y += jumpVelocity;
                    jumpVelocity += scene.gravity.y * 0.05;

                    if (camera.position.y <= 1.6) {
                        camera.position.y = 1.6;
                        isJumping = false;
                        jumpVelocity = 0;
                    }
                }
            });

            // 💡 3. 하얀 방에 어울리는 밝은 조명 설정
            const ambientLight = new BABYLON.HemisphericLight("ambient", new BABYLON.Vector3(0, 1, 0), scene);
            ambientLight.intensity = 0.8; // 방 전체
