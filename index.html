<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 방탈출: 상하좌우 시야 완성 버전</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #game-ui {
            position: absolute;
            bottom: 10%; left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 15px 30px;
            border: 3px solid #fff;
            border-radius: 8px;
            font-size: 18px;
            z-index: 1000;
            pointer-events: none;
            display: none;
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="game-ui"></div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let hasKey = false;

        const uiBox = document.getElementById('game-ui');
        function showMessage(text) {
            uiBox.innerText = text;
            uiBox.style.display = 'block';
            setTimeout(() => { uiBox.style.display = 'none'; }, 3000);
        }

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0.9, 0.9, 0.9);

            // 1인칭 시야 회전에 최적화된 UniversalCamera 생성
            const camera = new BABYLON.UniversalCamera("UniversalCamera", new BABYLON.Vector3(0, 1.6, 2.5), scene);
            camera.setTarget(new BABYLON.Vector3(0, 1.6, -4));
            camera.attachControl(canvas, true);

            // 💡 [핵심 수정] 터치 드래그 시 '이동'은 끄고, '상/하/좌/우 시야 회전'만 순수하게 작동하도록 커스텀 설정
            if (camera.inputs.attached.touch) {
                // 터치로 전진/후진하는 민감도를 0으로 만들어 이동 차단
                camera.inputs.attached.touch.touchMoveSensibility = 0; 
                // 터치로 상하좌우 화면을 돌리는 민감도 설정 (숫자가 낮을수록 회전이 빨라집니다)
                camera.inputs.attached.touch.touchAngularSensibility = 2000; 
            }

            // 마우스 드래그 시 시야 회전 민감도 (PC 환경용)
            camera.angularSensibility = 1500; 

            // 💡 고개를 너무 뒤로 꺾어 화면이 뒤집히는 현상을 방지하기 위해 상하 회전각(Pitch) 제한만 살짝 걸어둡니다.
            // 바빌론 1인칭 카메라에서 rotation.x는 상하 고개 숙이기/들기 각도입니다. (라디안 단위)
            scene.onBeforeRenderObservable.add(() => {
                if (camera.rotation.x > Math.PI / 3) camera.rotation.x = Math.PI / 3;   // 너무 아래를 보지 못하게 제한
                if (camera.rotation.x < -Math.PI / 3) camera.rotation.x = -Math.PI / 3; // 너무 위를 보지 못하게 제한
            });

            // 오직 WASD 키로만 이동하도록 키 매핑
            camera.keysUp = [87];    // W
            camera.keysDown = [83];  // S
            camera.keysLeft = [65];  // A
            camera.keysRight = [68]; // D
            
            camera.speed = 0.2;

            // 물리 및 중력/충돌 시스템 (벽 뚫기 방지)
            scene.collisionsEnabled = true;
            camera.checkCollisions = true;
            camera.applyGravity = true;
            camera.ellipsoid = new BABYLON.Vector3(0.4, 0.8, 0.4);

            // Space바 점프 구현
            let isJumping = false;
            let jumpVelocity = 0;

            window.addEventListener("keydown", function (evt) {
                if (evt.keyCode === 32 && !isJumping && camera.position.y <= 1.7) {
                    isJumping = true;
                    jumpVelocity = 0.12;
                }
            });

            scene.onBeforeRenderObservable.add(() => {
                if (isJumping) {
                    camera.position.y += jumpVelocity;
                    jumpVelocity += scene.gravity.y * 0.05;

                    if (camera.position.y <= 1.6) {
                        camera.position.y = 1.6;
                        isJumping = false;
                        jumpVelocity = 0;
                    }
                }
            });

            // 조명
            const ambientLight = new BABYLON.HemisphericLight("ambient", new BABYLON.Vector3(0, 1, 0), scene);
            ambientLight.intensity = 0.8;

            // 하얀색 방 마테리얼
            const whiteMat = new BABYLON.StandardMaterial("whiteMat", scene);
            whiteMat.diffuseColor = new BABYLON.Color3(0.95, 0.95, 0.95);

            // 바닥
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 8, height: 8}, scene);
            ground.material = whiteMat;
            ground.checkCollisions = true;

            // 사방을 막는 4개의 벽면 배치 (8x8 룸)
            const wallFront = BABYLON.MeshBuilder.CreateBox("wallFront", {width: 8, height: 4, depth: 0.2}, scene);
            wallFront.position = new BABYLON.Vector3(0, 2, -4);
            wallFront.material = whiteMat;
            wallFront.checkCollisions = true;

            const wallBack = BABYLON.MeshBuilder.CreateBox("wallBack", {width: 8, height: 4, depth: 0.2}, scene);
            wallBack.position = new BABYLON.Vector3(0, 2, 4);
            wallBack.material = whiteMat;
            wallBack.checkCollisions = true;

            const wallLeft = BABYLON.MeshBuilder.CreateBox("wallLeft", {width: 0.2, height: 4, depth: 8}, scene);
            wallLeft.position = new BABYLON.Vector3(-4, 2, 0);
            wallLeft.material = whiteMat;
            wallLeft.checkCollisions = true;

            const wallRight = BABYLON.MeshBuilder.CreateBox("wallRight", {width: 0.2, height: 4, depth: 8}, scene);
            wallRight.position = new BABYLON.Vector3(4, 2, 0);
            wallRight.material = whiteMat;
            wallRight.checkCollisions = true;

            // 탈출 문 (Door)
            const door = BABYLON.MeshBuilder.CreateBox("door", {width: 1.8, height: 2.8, depth: 0.15}, scene);
            door.position = new BABYLON.Vector3(0, 1.4, -3.85);
            const doorMat = new BABYLON.StandardMaterial("doorMat", scene);
            doorMat.diffuseColor = new BABYLON.Color3(0.4, 0.2, 0.1);
            door.material = doorMat;
            door.checkCollisions = true;

            // 열쇠 (Key)
            const key = BABYLON.MeshBuilder.CreateBox("key", {width: 0.3, height: 0.3, depth: 0.3}, scene);
            key.position = new BABYLON.Vector3(-2.5, 0.15, -2.5);
            const keyMat = new BABYLON.StandardMaterial("keyMat", scene);
            keyMat.diffuseColor = new BABYLON.Color3(1, 0.75, 0);
            key.material = keyMat;

            // 클릭/터치 상호작용
            scene.onPointerDown = function (evt, pickResult) {
                if (pickResult.hit) {
                    if (pickResult.pickedMesh === key && !hasKey) {
                        hasKey = true;
                        key.visibility = 0;
                        showMessage('황금 열쇠를 주웠다!');
                    }
                    if (pickResult.pickedMesh === door) {
                        if (hasKey) {
                            showMessage('탈출 성공!');
                            door.position.y = 4.2;
                            door.checkCollisions = false;
                        } else {
                            showMessage('문이 잠겨 있다. 열쇠를 찾아보자.');
                        }
                    }
                }
            };

            return scene;
        };

        const scene = createScene();

        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
