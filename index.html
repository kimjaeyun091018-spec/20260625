<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 방탈출: 맞춤형 조작 버전</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #game-ui {
            position: absolute;
            bottom: 10%; left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 15px 30px;
            border: 3px solid #fff;
            border-radius: 8px;
            font-size: 18px;
            z-index: 1000;
            pointer-events: none;
            display: none;
            text-align: center;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="game-ui"></div>
    <canvas id="renderCanvas"></canvas>

    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);
        let hasKey = false;

        const uiBox = document.getElementById('game-ui');
        function showMessage(text) {
            uiBox.innerText = text;
            uiBox.style.display = 'block';
            setTimeout(() => { uiBox.style.display = 'none'; }, 3000);
        }

        const createScene = function () {
            const scene = new BABYLON.Scene(engine);
            scene.clearColor = new BABYLON.Color3(0, 0, 0);
            scene.fogMode = BABYLON.Scene.FOGMODE_EXP;
            scene.fogDensity = 0.05;

            // 💡 1인칭 시야 회전에 최적화된 UniversalCamera 생성
            const camera = new BABYLON.UniversalCamera("UniversalCamera", new BABYLON.Vector3(0, 1.6, 0), scene);
            camera.attachControl(canvas, true);

            // 💡 1. 터치/마우스 이동 기능 제거 (시야 회전 기능만 남기기)
            // UniversalCamera의 기본 터치 입력엔 이동이 섞여있으므로, 시야 전용 터치 감도로 변환합니다.
            if (camera.inputs.attached.touch) {
                camera.inputs.attached.touch.touchMoveSensibility = 0; // 터치 드래그로 이동 안 되게 설정
            }

            // 💡 2. 오직 WASD 키로만 이동하도록 키 매핑 (방향키 제거)
            camera.keysUp = [87];    // W
            camera.keysDown = [83];  // S
            camera.keysLeft = [65];  // A
            camera.keysRight = [68]; // D
            
            camera.speed = 0.25;        // 이동 속도
            camera.angularSensibility = 1500; // 시야 회전 민감도 (낮을수록 빠름)

            // 물리 및 중력 설정 (점프 및 바닥 착지)
            scene.gravity = new BABYLON.Vector3(0, -0.15, 0);
            scene.collisionsEnabled = true;
            camera.checkCollisions = true;
            camera.applyGravity = true;
            camera.ellipsoid = new BABYLON.Vector3(0.5, 0.8, 0.5);

            // Space바 점프 구현
            let isJumping = false;
            let jumpVelocity = 0;

            window.addEventListener("keydown", function (evt) {
                if (evt.keyCode === 32 && !isJumping && camera.position.y <= 1.7) {
                    isJumping = true;
                    jumpVelocity = 0.12;
                }
            });

            scene.onBeforeRenderObservable.add(() => {
                if (isJumping) {
                    camera.position.y += jumpVelocity;
                    jumpVelocity += scene.gravity.y * 0.05;

                    if (camera.position.y <= 1.6) {
                        camera.position.y = 1.6;
                        isJumping = false;
                        jumpVelocity = 0;
                    }
                }
            });

            // 조명
            const ambientLight = new BABYLON.HemisphericLight("ambient", new BABYLON.Vector3(0, 1, 0), scene);
            ambientLight.intensity = 0.1;

            const spotLight = new BABYLON.SpotLight("spot", new BABYLON.Vector3(0, 4, 0), new BABYLON.Vector3(0, -1, 0), Math.PI / 3, 2, scene);
            spotLight.intensity = 1.5;

            // 바닥
            const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 15, height: 15}, scene);
            const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
            groundMat.diffuseColor = new BABYLON.Color3(0.1, 0.1, 0.1);
            ground.material = groundMat;
            ground.checkCollisions = true;

            // 벽면
            const wallMat = new BABYLON.StandardMaterial("wallMat", scene);
            wallMat.diffuseColor = new BABYLON.Color3(0.15, 0.15, 0.15);

            const wall1 = BABYLON.MeshBuilder.CreateBox("wall1", {width: 15, height: 4, depth: 0.5}, scene);
            wall1.position = new BABYLON.Vector3(0, 2, -7.5);
            wall1.material = wallMat;
            wall1.checkCollisions = true;

            // 문 (Door)
            const door = BABYLON.MeshBuilder.CreateBox("door", {width: 2, height: 3, depth: 0.2}, scene);
            door.position = new BABYLON.Vector3(0, 1.5, -7.3);
            const doorMat = new BABYLON.StandardMaterial("doorMat", scene);
            doorMat.diffuseColor = new BABYLON.Color3(0.3, 0.15, 0.05);
            door.material = doorMat;
            door.checkCollisions = true;

            // 열쇠 (Key)
            const key = BABYLON.MeshBuilder.CreateBox("key", {width: 0.4, height: 0.4, depth: 0.4}, scene);
            key.position = new BABYLON.Vector3(-4, 0.2, -4);
            const keyMat = new BABYLON.StandardMaterial("keyMat", scene);
            keyMat.diffuseColor = new BABYLON.Color3(1, 0.85, 0);
            key.material = keyMat;

            // 클릭/터치 상호작용
            scene.onPointerDown = function (evt, pickResult) {
                if (pickResult.hit) {
                    if (pickResult.pickedMesh === key && !hasKey) {
                        hasKey = true;
                        key.visibility = 0;
                        showMessage('황금 열쇠를 주웠다!');
                    }
                    if (pickResult.pickedMesh === door) {
                        if (hasKey) {
                            showMessage('탈출 성공!');
                            door.position.y = 4.5;
                            door.checkCollisions = false;
                        } else {
                            showMessage('문이 잠겨 있다. 열쇠를 찾아보자.');
                        }
                    }
                }
            };

            return scene;
        };

        const scene = createScene();

        engine.runRenderLoop(function () {
            scene.render();
        });

        window.addEventListener("resize", function () {
            engine.resize();
        });
    </script>
</body>
</html>
