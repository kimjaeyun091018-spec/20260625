<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D 방탈출: PC 버전 완성</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        /* 게임 화면 위에 겹쳐서 텍스트를 보여줄 UI 스타일 */
        #game-ui {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Malgun Gothic', sans-serif;
            z-index: 100; /* 3D 화면보다 위로 오게 설정 */
            pointer-events: none; /* 클릭을 방해하지 않음 */
            text-shadow: 2px 2px 4px #000; /* 글씨가 잘 보이게 그림자 추가 */
        }
    </style>
</head>
<body>
    <div id="game-ui">게임 화면을 클릭하면 마우스가 고정됩니다. (취소: ESC)</div>

    <a-scene fog="type: exponential; color: #000; density: 0.15" vr-mode-ui="enabled: false">
        
        <a-entity position="0 1.6 0">
            <a-camera look-controls="pointerLockEnabled: true" wasd-controls>
                <a-cursor color="#ff0000" scale="0.8 0.8 0.8"></a-cursor>
                <a-light type="spot" color="#ffffff" intensity="1.5" distance="15" angle="35" position="0 0 0"></a-light>
            </a-camera>
        </a-entity>

        <a-light type="ambient" color="#050505"></a-light>

        <a-plane position="0 0 0" rotation="-90 0 0" width="15" height="15" color="#111"></a-plane>
        <a-box position="0 2 -7.5" width="15" height="4" depth="0.5" color="#222"></a-box>
        <a-box position="0 2 7.5" width="15" height="4" depth="0.5" color="#222"></a-box> 
        <a-box position="-7.5 2 0" rotation="0 90 0" width="15" height="4" depth="0.5" color="#222"></a-box>
        <a-box position="7.5 2 0" rotation="0 90 0" width="15" height="4" depth="0.5" color="#222"></a-box> 

        <a-box id="escape-door" position="0 1.5 -7.2" width="2" height="3" depth="0.2" color="#4a2711"></a-box>
        <a-box id="key" position="-6 0.2 -6" width="0.4" height="0.4" depth="0.4" color="#ffd700"></a-box>

    </a-scene>

    <script>
        let hasKey = false;
        const keyObj = document.querySelector('#key');
        const doorObj = document.querySelector('#escape-door');
        const uiText = document.querySelector('#game-ui');

        // 자막을 3초간 띄우고 지우는 함수
        function showMessage(text) {
            uiText.innerText = text;
            setTimeout(() => {
                uiText.innerText = '';
            }, 3000);
        }

        keyObj.addEventListener('click', () => {
            if (!hasKey) {
                hasKey = true;
                keyObj.setAttribute('visible', 'false');
                keyObj.removeAttribute('class');
                showMessage('반짝이는 황금 열쇠를 주웠습니다!');
            }
        });

        doorObj.addEventListener('click', () => {
            if (hasKey) {
                showMessage('철컥! 열쇠가 맞아 문이 열렸습니다. 탈출 성공!');
                doorObj.setAttribute('position', '0 4.5 -7.2'); 
            } else {
                showMessage('문이 굳게 잠겨 있습니다. 방 안에서 열쇠를 찾아보세요.');
            }
        });
    </script>
</body>
</html>
